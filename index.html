<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Ma Cave" />
<meta name="theme-color" content="#1a0a00" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
<title>Ma Cave à Vin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:#faf8f5;--surface:#fff;--surface2:#f4f0eb;--border:rgba(60,30,10,.12);--border2:rgba(60,30,10,.22);
  --text:#1a0a00;--text2:#6b4f3a;--text3:#a8866e;--accent:#8b1a1a;--accent2:#c4973a;
  --rouge:#8b1a1a;--blanc:#c4973a;--rose:#c45a7a;--champagne:#2e7d52;--mousseux:#2e7d52;
  --font-d:'Cormorant Garamond',Georgia,serif;--font-b:'DM Sans',system-ui,sans-serif;
  --r:10px;--r-lg:16px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#120700;--surface:#1e0e05;--surface2:#2a1508;--border:rgba(255,200,150,.10);--border2:rgba(255,200,150,.20);
  --text:#f5ede4;--text2:#c4a882;--text3:#7a6050;--accent:#c44040;--accent2:#d4a84a;
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5;}
.app-header{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:56px;}
.app-title{font-family:var(--font-d);font-size:22px;font-weight:600;letter-spacing:.01em;color:var(--accent);}
.header-count{font-size:12px;color:var(--text3);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;cursor:pointer;border:none;background:none;color:var(--text3);font-family:var(--font-b);font-size:10px;transition:color .15s;}
.nav-tab svg{width:22px;height:22px;}
.nav-tab.active{color:var(--accent);}
.main{padding:1rem 1rem 6rem;max-width:640px;margin:0 auto;}
.page{display:none;}.page.active{display:block;}
.wine-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.wine-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:.9rem;cursor:pointer;transition:transform .15s;-webkit-user-select:none;user-select:none;}
.wine-card:active{transform:scale(.97);}
.type-pill{display:inline-block;font-size:10px;font-weight:500;padding:2px 9px;border-radius:99px;margin-bottom:8px;text-transform:capitalize;letter-spacing:.04em;}
.pill-rouge{background:rgba(139,26,26,.12);color:var(--rouge);}
.pill-blanc{background:rgba(196,151,58,.15);color:var(--blanc);}
.pill-rosé{background:rgba(196,90,122,.12);color:var(--rose);}
.pill-champagne,.pill-mousseux{background:rgba(46,125,82,.12);color:var(--champagne);}
.wine-name{font-family:var(--font-d);font-size:16px;font-weight:500;margin-bottom:2px;line-height:1.3;}
.wine-sub{font-size:11px;color:var(--text3);}
.wine-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid var(--border);}
.wine-qty{font-size:13px;font-weight:500;color:var(--text2);}
.wine-price{font-size:11px;color:var(--text3);}
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;padding:5px 13px;border-radius:99px;border:1px solid var(--border2);background:transparent;font-size:12px;font-family:var(--font-b);color:var(--text2);cursor:pointer;transition:all .15s;}
.filter-chip.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.search-wrap{position:relative;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text3);}
.search-input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font-b);font-size:14px;outline:none;}
.search-input:focus{border-color:var(--accent);}
.top-bar{display:flex;gap:8px;align-items:center;margin-bottom:1rem;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1rem;}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.stat-value{font-family:var(--font-d);font-size:28px;font-weight:500;}
.stat-value span{font-size:14px;color:var(--text3);font-family:var(--font-b);}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1rem;margin-bottom:10px;}
.section-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-weight:500;}
.bar-chart{display:flex;align-items:flex-end;gap:10px;height:100px;}
.bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-fill{width:100%;border-radius:4px 4px 0 0;min-height:3px;}
.bar-val{font-size:11px;font-weight:500;color:var(--text2);}
.bar-lbl{font-size:10px;color:var(--text3);text-align:center;}
.accord-wrap{display:flex;flex-wrap:wrap;gap:6px;}
.accord-tag{background:var(--surface2);border-radius:var(--r);padding:5px 11px;font-size:12px;color:var(--text2);border:1px solid var(--border);}
.region-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.region-row:last-child{border-bottom:none;}
.region-bar-bg{flex:1;height:4px;background:var(--surface2);border-radius:2px;margin:0 10px;}
.region-bar-fill{height:100%;border-radius:2px;background:var(--accent2);}
.detail-hero{margin-bottom:1.5rem;}
.detail-name{font-family:var(--font-d);font-size:28px;font-weight:600;line-height:1.2;margin:8px 0 4px;}
.detail-sub{font-size:13px;color:var(--text3);}
.detail-actions{display:flex;gap:8px;margin-top:12px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px;}
.info-row:last-child{border-bottom:none;}
.info-key{color:var(--text3);font-size:12px;}
.qty-controls{display:flex;align-items:center;gap:12px;}
.qty-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:transparent;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);}
.qty-num{font-family:var(--font-d);font-size:22px;font-weight:500;min-width:32px;text-align:center;}
.stars{display:flex;gap:3px;}
.star{font-size:18px;color:var(--border2);cursor:pointer;}
.star.on{color:var(--accent2);}
.degustation-note{font-size:14px;line-height:1.7;color:var(--text2);font-style:italic;}
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:1.5rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom));width:100%;max-width:640px;max-height:92vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 1.25rem;}
.modal-title{font-family:var(--font-d);font-size:20px;font-weight:600;margin-bottom:1.25rem;color:var(--accent);}
.form-group{margin-bottom:14px;}
.form-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px;}
.form-input{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface2);color:var(--text);font-family:var(--font-b);font-size:14px;outline:none;-webkit-appearance:none;}
.form-input:focus{border-color:var(--accent);}
textarea.form-input{min-height:80px;resize:vertical;}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem;}
.btn-primary{flex:1;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:var(--font-b);font-size:14px;font-weight:500;cursor:pointer;}
.btn-ghost{padding:12px 16px;background:transparent;border:1px solid var(--border2);border-radius:var(--r);font-family:var(--font-b);font-size:14px;cursor:pointer;color:var(--text2);}
.btn-sm-ghost{padding:9px 14px;background:transparent;border:1px solid var(--border2);border-radius:var(--r);font-family:var(--font-b);font-size:12px;cursor:pointer;color:var(--text2);white-space:nowrap;}
.btn-danger{padding:10px 14px;background:transparent;border:1px solid rgba(180,30,30,.3);border-radius:var(--r);font-family:var(--font-b);font-size:13px;cursor:pointer;color:#b41e1e;}
.btn-edit{padding:9px 16px;background:transparent;border:1px solid var(--border2);border-radius:var(--r);font-family:var(--font-b);font-size:13px;cursor:pointer;color:var(--text2);}
.btn-finder{width:100%;padding:10px;background:transparent;border:1px dashed var(--accent2);border-radius:var(--r);font-family:var(--font-b);font-size:13px;cursor:pointer;color:var(--accent2);margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-finder:disabled{opacity:.5;cursor:not-allowed;}
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text3);cursor:pointer;border:none;background:none;margin-bottom:1rem;padding:0;font-family:var(--font-b);}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text3);}
.empty-state .big{font-size:48px;margin-bottom:.5rem;}
.empty-state p{font-size:14px;}
.fab{position:fixed;bottom:calc(64px + env(safe-area-inset-bottom) + 16px);right:1rem;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(139,26,26,.4);z-index:40;}
.finder-box{background:rgba(196,151,58,.08);border:1px solid rgba(196,151,58,.3);border-radius:var(--r);padding:10px 12px;margin-bottom:14px;font-size:13px;color:var(--text2);}
.finder-box strong{color:var(--accent2);display:block;margin-bottom:4px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent2);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.import-zone{border:2px dashed var(--border2);border-radius:var(--r-lg);padding:2rem;text-align:center;cursor:pointer;transition:border-color .2s;}
.import-zone.drag{border-color:var(--accent2);}
.import-zone p{font-size:14px;color:var(--text3);margin-top:8px;}
.import-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.import-row:last-child{border-bottom:none;}
.badge-new{font-size:10px;padding:2px 7px;border-radius:99px;background:rgba(46,125,82,.15);color:var(--champagne);}
.badge-dup{font-size:10px;padding:2px 7px;border-radius:99px;background:rgba(196,151,58,.15);color:var(--accent2);}
.import-scroll{max-height:200px;overflow-y:auto;margin-top:.5rem;}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">Ma Cave</div>
  <div class="header-count" id="header-count"></div>
</header>

<main class="main">

  <!-- INVENTAIRE -->
  <div id="page-inventaire" class="page active">
    <div class="top-bar">
      <div class="search-wrap" style="flex:1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="search-input" id="search" type="search" placeholder="Rechercher un vin..." oninput="renderWines()" />
      </div>
      <button class="btn-sm-ghost" onclick="openImportModal()">⬆ Importer</button>
    </div>
    <div class="filter-bar">
      <button class="filter-chip active" data-type="" onclick="setFilter('')">Tous</button>
      <button class="filter-chip" data-type="rouge" onclick="setFilter('rouge')">Rouge</button>
      <button class="filter-chip" data-type="blanc" onclick="setFilter('blanc')">Blanc</button>
      <button class="filter-chip" data-type="rosé" onclick="setFilter('rosé')">Rosé</button>
      <button class="filter-chip" data-type="champagne" onclick="setFilter('champagne')">Champagne</button>
      <button class="filter-chip" data-type="mousseux" onclick="setFilter('mousseux')">Mousseux</button>
    </div>
    <div id="wine-list"></div>
  </div>

  <!-- STATS -->
  <div id="page-stats" class="page">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="section-card">
      <div class="section-title">Répartition par type</div>
      <div class="bar-chart" id="bar-chart"></div>
    </div>
    <div class="section-card">
      <div class="section-title">Top régions</div>
      <div id="region-list"></div>
    </div>
    <div class="section-card">
      <div class="section-title">Accords mets-vins suggérés</div>
      <div class="accord-wrap" id="accord-suggestions"></div>
    </div>
  </div>

  <!-- DETAIL -->
  <div id="page-detail" class="page">
    <button class="back-btn" onclick="showPage('inventaire')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      Retour
    </button>
    <div id="detail-content"></div>
  </div>

</main>

<button class="fab" id="fab" onclick="openAddModal()">+</button>

<nav class="bottom-nav">
  <button class="nav-tab active" id="tab-inventaire" onclick="showPage('inventaire')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9h18M3 15h18M9 3v18M15 3v18" stroke-linecap="round"/></svg>
    Inventaire
  </button>
  <button class="nav-tab" id="tab-stats" onclick="showPage('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 20V10M12 20V4M6 20v-6" stroke-linecap="round"/></svg>
    Statistiques
  </button>
</nav>

<!-- MODAL AJOUT/ÉDITION -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Ajouter un vin</div>
    <input type="hidden" id="edit-id" />

    <div class="form-group">
      <label class="form-label">Nom du vin *</label>
      <input class="form-input" id="f-name" type="text" placeholder="ex : Château Margaux" />
    </div>

    <button class="btn-finder" id="btn-finder" onclick="runWineFinder()">
      <span id="finder-icon">🔍</span>
      <span id="finder-label">Wine Finder — Rechercher infos automatiquement</span>
    </button>
    <div id="finder-result" style="display:none" class="finder-box"></div>

    <div class="form-row2">
      <div class="form-group">
        <label class="form-label">Type *</label>
        <select class="form-input" id="f-type">
          <option value="rouge">Rouge</option>
          <option value="blanc">Blanc</option>
          <option value="rosé">Rosé</option>
          <option value="champagne">Champagne</option>
          <option value="mousseux">Mousseux</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Millésime</label>
        <input class="form-input" id="f-year" type="number" placeholder="2019" min="1900" max="2025" />
      </div>
    </div>
    <div class="form-row2">
      <div class="form-group">
        <label class="form-label">Région</label>
        <input class="form-input" id="f-region" type="text" placeholder="ex : Bordeaux" />
      </div>
      <div class="form-group">
        <label class="form-label">Pays</label>
        <input class="form-input" id="f-country" type="text" placeholder="ex : France" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Cépages</label>
      <input class="form-input" id="f-grapes" type="text" placeholder="ex : Cabernet Sauvignon, Merlot" />
    </div>
    <div class="form-row2">
      <div class="form-group">
        <label class="form-label">Quantité *</label>
        <input class="form-input" id="f-qty" type="number" value="1" min="0" />
      </div>
      <div class="form-group">
        <label class="form-label">Prix / btl (€)</label>
        <input class="form-input" id="f-price" type="number" placeholder="0" min="0" step="0.5" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Note</label>
      <div class="stars" id="modal-stars">
        <span class="star" onclick="setStar(1)">★</span>
        <span class="star" onclick="setStar(2)">★</span>
        <span class="star" onclick="setStar(3)">★</span>
        <span class="star" onclick="setStar(4)">★</span>
        <span class="star" onclick="setStar(5)">★</span>
      </div>
      <input type="hidden" id="f-note" value="0" />
    </div>
    <div class="form-group">
      <label class="form-label">Notes de dégustation</label>
      <textarea class="form-input" id="f-notes" placeholder="Arômes, saveurs, impressions..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('modal-add')">Annuler</button>
      <button class="btn-primary" onclick="saveWine()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL IMPORT -->
<div class="modal-overlay" id="modal-import">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Importer une liste</div>

    <div class="import-zone" id="import-zone"
      onclick="document.getElementById('file-input').click()"
      ondragover="ev.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="handleDrop(event)">
      <div style="font-size:36px">📂</div>
      <p>Glissez un fichier ici ou cliquez</p>
      <p style="font-size:11px;margin-top:4px;opacity:.6">Formats : JSON · CSV</p>
      <input type="file" id="file-input" accept=".json,.csv" style="display:none" onchange="handleFile(this)" />
    </div>

    <div id="import-info" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin:1rem 0 .5rem">
        <span id="import-summary" style="font-size:13px;color:var(--text2)"></span>
        <label style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;cursor:pointer">
          <input type="checkbox" id="enrich-check" checked />
          Wine Finder auto
        </label>
      </div>
      <div class="import-scroll" id="import-rows"></div>
    </div>

    <div class="modal-actions" style="margin-top:1rem">
      <button class="btn-ghost" onclick="closeModal('modal-import')">Annuler</button>
      <button class="btn-primary" id="btn-do-import" style="display:none" onclick="confirmImport()">Importer</button>
    </div>
  </div>
</div>

<script>
const ACCORDS={
  rouge:['Viande rouge','Agneau','Fromages affinés','Gibier','Pâtes bolognaise','Charcuterie','Canard','Côte de bœuf'],
  blanc:['Poisson','Fruits de mer','Volaille','Chèvre frais','Risotto','Asperges','Saint-Jacques','Sole meunière'],
  rosé:['Salade niçoise','Grillades légères','Tapas','Poissons grillés','Cuisine provençale','Fromages frais'],
  champagne:['Huîtres','Caviar','Foie gras','Amuse-bouches','Saumon fumé','Langoustines'],
  mousseux:['Apéritif','Fruits','Crème dessert','Gâteau léger','Cuisine asiatique légère']
};
const TYPE_COLORS={rouge:'#8b1a1a',blanc:'#c4973a',rosé:'#c45a7a',champagne:'#2e7d52',mousseux:'#2e7d52'};

let wines=[], currentFilter='', detailId=null, currentNote=0, pendingImport=[];

function load(){try{wines=JSON.parse(localStorage.getItem('cave_v4')||'[]');}catch(e){wines=[];}}
function save(){localStorage.setItem('cave_v4',JSON.stringify(wines));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function updateHeader(){
  const t=wines.reduce((s,w)=>s+(w.qty||0),0);
  document.getElementById('header-count').textContent=t+' bouteille'+(t!==1?'s':'');
}

function showPage(p){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(e=>e.classList.remove('active'));
  const t=document.getElementById('tab-'+p);
  if(t)t.classList.add('active');
  document.getElementById('fab').style.display=(p==='inventaire')?'flex':'none';
  if(p==='stats')renderStats();
  if(p==='inventaire')renderWines();
  updateHeader();
}

function setFilter(type){
  currentFilter=type;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.type===type));
  renderWines();
}

function renderWines(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const list=wines.filter(w=>{
    const ok=!q||w.name.toLowerCase().includes(q)||(w.region||'').toLowerCase().includes(q)||(w.country||'').toLowerCase().includes(q);
    return ok&&(!currentFilter||w.type===currentFilter);
  });
  const el=document.getElementById('wine-list');
  if(!list.length){
    el.innerHTML=`<div class="empty-state"><div class="big">🍷</div><p>${wines.length?'Aucun résultat.':'Votre cave est vide.<br>Ajoutez votre premier vin !'}</p></div>`;
    return;
  }
  el.innerHTML=`<div class="wine-grid">${list.map(w=>`
    <div class="wine-card" onclick="showDetail('${w.id}')">
      <span class="type-pill pill-${w.type}">${w.type.charAt(0).toUpperCase()+w.type.slice(1)}</span>
      <div class="wine-name">${esc(w.name)}</div>
      <div class="wine-sub">${[w.year,w.region].filter(Boolean).join(' · ')}</div>
      <div class="wine-footer">
        <span class="wine-qty">${w.qty} btl${w.qty!==1?'s':''}</span>
        <span class="wine-price">${w.price?w.price+'€':''}</span>
      </div>
    </div>`).join('')}</div>`;
}

function showDetail(id){
  const w=wines.find(x=>x.id===id);
  if(!w)return;
  detailId=id;
  const stars=Array.from({length:5},(_,i)=>`<span style="color:${i<(w.note||0)?'#c4973a':'rgba(100,80,60,.2)'}">★</span>`).join('');
  const val=w.price&&w.qty?`<div class="info-row"><span class="info-key">Valeur totale</span><span style="font-weight:500">${Math.round(w.price*w.qty)} €</span></div>`:'';
  const accords=(ACCORDS[w.type]||[]).slice(0,7).map(a=>`<span class="accord-tag">${a}</span>`).join('');
  document.getElementById('detail-content').innerHTML=`
    <div class="detail-hero">
      <span class="type-pill pill-${w.type}">${w.type.charAt(0).toUpperCase()+w.type.slice(1)}</span>
      <div class="detail-name">${esc(w.name)}</div>
      <div class="detail-sub">${[w.region,w.country,w.year].filter(Boolean).join(' · ')}</div>
      ${w.grapes?`<div style="font-size:12px;color:var(--text3);margin-top:4px">🍇 ${esc(w.grapes)}</div>`:''}
      <div class="detail-actions">
        <button class="btn-edit" onclick="openEditModal('${id}')">Modifier</button>
        <button class="btn-danger" onclick="deleteWine('${id}')">Supprimer</button>
      </div>
    </div>
    <div class="section-card" style="margin-bottom:10px">
      <div class="section-title">Stock</div>
      <div class="info-row"><span class="info-key">Quantité</span>
        <div class="qty-controls">
          <button class="qty-btn" onclick="adjustQty(-1)">−</button>
          <span class="qty-num" id="qty-val">${w.qty}</span>
          <button class="qty-btn" onclick="adjustQty(1)">+</button>
        </div>
      </div>
      ${w.price?`<div class="info-row"><span class="info-key">Prix / bouteille</span><span>${w.price} €</span></div>`:''}
      ${val}
      ${w.note?`<div class="info-row"><span class="info-key">Note</span><span>${stars}</span></div>`:''}
    </div>
    <div class="section-card" style="margin-bottom:10px">
      <div class="section-title">Accords mets-vins</div>
      <div class="accord-wrap">${accords}</div>
    </div>
    ${w.notes?`<div class="section-card" style="margin-bottom:10px"><div class="section-title">Notes de dégustation</div><p class="degustation-note">${esc(w.notes)}</p></div>`:''}
    ${w.description&&w.description!==w.notes?`<div class="section-card"><div class="section-title">Description</div><p class="degustation-note">${esc(w.description)}</p></div>`:''}
  `;
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.getElementById('page-detail').classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(e=>e.classList.remove('active'));
  document.getElementById('fab').style.display='none';
}

function adjustQty(d){
  const w=wines.find(x=>x.id===detailId);
  if(!w)return;
  w.qty=Math.max(0,(w.qty||0)+d);
  save();updateHeader();
  const el=document.getElementById('qty-val');
  if(el)el.textContent=w.qty;
}

function deleteWine(id){
  if(!confirm('Supprimer ce vin ?'))return;
  wines=wines.filter(x=>x.id!==id);
  save();showPage('inventaire');
}

function openAddModal(){
  document.getElementById('modal-title').textContent='Ajouter un vin';
  document.getElementById('edit-id').value='';
  clearForm();
  document.getElementById('modal-add').classList.add('open');
}

function openEditModal(id){
  const w=wines.find(x=>x.id===id);
  if(!w)return;
  document.getElementById('modal-title').textContent='Modifier le vin';
  document.getElementById('edit-id').value=id;
  document.getElementById('f-name').value=w.name||'';
  document.getElementById('f-type').value=w.type||'rouge';
  document.getElementById('f-year').value=w.year||'';
  document.getElementById('f-region').value=w.region||'';
  document.getElementById('f-country').value=w.country||'';
  document.getElementById('f-grapes').value=w.grapes||'';
  document.getElementById('f-qty').value=w.qty||1;
  document.getElementById('f-price').value=w.price||'';
  document.getElementById('f-notes').value=w.notes||'';
  document.getElementById('finder-result').style.display='none';
  setStar(w.note||0);
  document.getElementById('modal-add').classList.add('open');
}

function clearForm(){
  ['f-name','f-year','f-region','f-country','f-grapes','f-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-qty').value=1;
  document.getElementById('f-price').value='';
  document.getElementById('f-type').value='rouge';
  document.getElementById('finder-result').style.display='none';
  document.getElementById('finder-label').textContent='Wine Finder — Rechercher infos automatiquement';
  document.getElementById('finder-icon').textContent='🔍';
  document.getElementById('btn-finder').disabled=false;
  setStar(0);
}

function closeModal(id){document.getElementById(id).classList.remove('open');}

function setStar(v){
  currentNote=v;
  document.getElementById('f-note').value=v;
  document.querySelectorAll('#modal-stars .star').forEach((s,i)=>s.classList.toggle('on',i<v));
}

function saveWine(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Le nom est obligatoire.');return;}
  const editId=document.getElementById('edit-id').value;
  const data={
    name,type:document.getElementById('f-type').value,
    year:parseInt(document.getElementById('f-year').value)||null,
    region:document.getElementById('f-region').value.trim(),
    country:document.getElementById('f-country').value.trim(),
    grapes:document.getElementById('f-grapes').value.trim(),
    qty:parseInt(document.getElementById('f-qty').value)||0,
    price:parseFloat(document.getElementById('f-price').value)||null,
    note:currentNote,
    notes:document.getElementById('f-notes').value.trim()
  };
  if(editId){
    const idx=wines.findIndex(x=>x.id===editId);
    if(idx>=0)wines[idx]={...wines[idx],...data};
  }else{
    wines.push({id:uid(),...data});
  }
  save();closeModal('modal-add');
  if(editId)showDetail(editId);else{renderWines();updateHeader();}
}

/* ════════════════════════════
   WINE FINDER
════════════════════════════ */
async function runWineFinder(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Entrez d\'abord le nom du vin.');return;}
  const btn=document.getElementById('btn-finder');
  const lbl=document.getElementById('finder-label');
  const icon=document.getElementById('finder-icon');
  btn.disabled=true;
  icon.innerHTML='<span class="spinner"></span>';
  lbl.textContent='Recherche en cours...';
  document.getElementById('finder-result').style.display='none';

  let found={}, sources=[];

  try{const r=await searchWikipedia(name);if(r){Object.assign(found,r);sources.push('Wikipedia');}}catch(e){}
  try{const r=await searchLCBO(name);if(r){for(const k in r){if(!found[k])found[k]=r[k];}sources.push('LCBO');}}catch(e){}

  btn.disabled=false;
  icon.textContent='🔍';

  if(!Object.keys(found).length){
    lbl.textContent='Wine Finder — Aucun résultat, remplissez manuellement';
    return;
  }
  lbl.textContent='Wine Finder — Relancer';

  if(found.type)document.getElementById('f-type').value=found.type;
  if(found.region&&!document.getElementById('f-region').value)document.getElementById('f-region').value=found.region;
  if(found.country&&!document.getElementById('f-country').value)document.getElementById('f-country').value=found.country;
  if(found.grapes&&!document.getElementById('f-grapes').value)document.getElementById('f-grapes').value=found.grapes;
  if(found.year&&!document.getElementById('f-year').value)document.getElementById('f-year').value=found.year;
  if(found.description&&!document.getElementById('f-notes').value)document.getElementById('f-notes').value=found.description.slice(0,300);

  const lines=[];
  if(found.region||found.country)lines.push('📍 '+[found.region,found.country].filter(Boolean).join(', '));
  if(found.grapes)lines.push('🍇 '+found.grapes);
  if(found.description)lines.push('📝 '+found.description.slice(0,100)+'…');

  const el=document.getElementById('finder-result');
  el.innerHTML=`<strong>Source : ${sources.join(' + ')}</strong>${lines.map(l=>`<div style="margin-top:3px">${esc(l)}</div>`).join('')}`;
  el.style.display='block';
}

async function searchWikipedia(name){
  const sr=await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(name+' wine')}&format=json&origin=*&srlimit=3`);
  const sd=await sr.json();
  if(!sd.query?.search?.length)return null;
  const title=sd.query.search[0].title;
  const pr=await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=extracts&exintro=true&explaintext=true&format=json&origin=*`);
  const pd=await pr.json();
  const page=Object.values(pd.query?.pages||{})[0];
  if(!page?.extract)return null;
  const text=page.extract;
  const res={};
  // Region
  const rp=[/produced in\s+([A-Z][a-zA-ZÀ-ÿ\s\-]+?)(?:\.|,)/i,/from (?:the\s+)?([A-Z][a-zA-ZÀ-ÿ\s\-]+?)\s+(?:region|wine|appellation)/i];
  for(const p of rp){const m=text.match(p);if(m){res.region=m[1].trim().slice(0,50);break;}}
  // Country
  for(const c of['France','Italy','Spain','Germany','Portugal','Australia','Argentina','Chile','United States','South Africa','New Zealand','Austria','Belgium']){
    if(text.includes(c)){res.country=c==='United States'?'USA':c;break;}
  }
  // Grapes
  const gm=text.match(/(?:made from|grape varieties?|varietal)[^\n]*?(?:include|:|such as)?\s+([A-Z][a-zA-ZÀ-ÿ,\s]+?)(?:\.|and [a-z]|\n)/i);
  if(gm)res.grapes=gm[1].trim().slice(0,80);
  // Type
  const l=text.toLowerCase();
  if(l.includes('red wine'))res.type='rouge';
  else if(l.includes('white wine'))res.type='blanc';
  else if(l.includes('rosé'))res.type='rosé';
  else if(l.includes('champagne')||l.includes('sparkling'))res.type='champagne';
  // Description
  const paras=text.split('\n').filter(p=>p.length>80);
  if(paras.length)res.description=paras[0].slice(0,400);
  return Object.keys(res).length?res:null;
}

async function searchLCBO(name){
  const r=await fetch(`https://platform.lcbo.com/catalog/api/en/search?q=${encodeURIComponent(name)}&filter[facet]=product_type%3AWine&page[size]=3`,{headers:{Accept:'application/json'}});
  if(!r.ok)return null;
  const d=await r.json();
  const item=d?.data?.[0];
  if(!item)return null;
  const a=item.attributes||{};
  const res={};
  if(a.country_of_manufacture)res.country=a.country_of_manufacture;
  if(a.region)res.region=a.region;
  if(a.varietal_name)res.grapes=a.varietal_name;
  if(a.tasting_note)res.description=a.tasting_note;
  const style=(a.wine_style_name||a.lcbo_wine_type||'').toLowerCase();
  if(style.includes('red'))res.type='rouge';
  else if(style.includes('white'))res.type='blanc';
  else if(style.includes('ros'))res.type='rosé';
  else if(style.includes('spark')||style.includes('champagne'))res.type='champagne';
  return Object.keys(res).length?res:null;
}

/* ════════════════════════════
   IMPORT
════════════════════════════ */
function openImportModal(){
  pendingImport=[];
  document.getElementById('import-info').style.display='none';
  document.getElementById('btn-do-import').style.display='none';
  document.getElementById('import-zone').style.display='block';
  document.getElementById('file-input').value='';
  document.getElementById('modal-import').classList.add('open');
}

function handleDrop(e){
  e.preventDefault();
  document.getElementById('import-zone').classList.remove('drag');
  const f=e.dataTransfer.files[0];
  if(f)processFile(f);
}

function handleFile(input){if(input.files[0])processFile(input.files[0]);}

function processFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      let data=[];
      if(file.name.endsWith('.json')){
        const p=JSON.parse(e.target.result);
        data=Array.isArray(p)?p:[p];
      }else{
        data=parseCSV(e.target.result);
      }
      pendingImport=data.map(normalizeWine).filter(w=>w.name);
      if(!pendingImport.length){alert('Aucun vin reconnu dans le fichier.');return;}
      showImportPreview();
    }catch(err){alert('Erreur : '+err.message);}
  };
  reader.readAsText(file);
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2)return[];
  const headers=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/"/g,''));
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=line.split(',').map(v=>v.trim().replace(/^"|"$/g,''));
    const obj={};
    headers.forEach((h,i)=>{if(vals[i])obj[h]=vals[i];});
    return obj;
  });
}

function normalizeWine(r){
  return{
    name:(r.nom||r.name||r.vin||r.wine||'').trim(),
    type:normalizeType(r.type||r.couleur||r.color||''),
    year:parseInt(r.millesime||r.millésime||r.year||r.vintage)||null,
    region:(r.region||r.région||r.appellation||'').trim(),
    country:(r.pays||r.country||'').trim(),
    grapes:(r.cepages||r.cépages||r.grapes||r.varietal||'').trim(),
    qty:parseInt(r.quantite||r.quantité||r.qty||r.quantity||1)||1,
    price:parseFloat(r.prix||r.price)||null,
    note:parseInt(r.note||r.rating)||0,
    notes:(r.notes||r.degustation||r.tasting||'').trim(),
  };
}

function normalizeType(t){
  const l=(t||'').toLowerCase();
  if(l.includes('rouge')||l.includes('red'))return'rouge';
  if(l.includes('blanc')||l.includes('white'))return'blanc';
  if(l.includes('ros'))return'rosé';
  if(l.includes('champ'))return'champagne';
  if(l.includes('mous')||l.includes('spark'))return'mousseux';
  return'rouge';
}

function showImportPreview(){
  const dups=pendingImport.filter(w=>wines.some(x=>x.name.toLowerCase()===w.name.toLowerCase()));
  const news=pendingImport.length-dups.length;
  document.getElementById('import-summary').textContent=`${pendingImport.length} vins — ${news} nouveaux, ${dups.length} doublons`;
  document.getElementById('import-rows').innerHTML=pendingImport.map(w=>{
    const dup=wines.some(x=>x.name.toLowerCase()===w.name.toLowerCase());
    return`<div class="import-row"><span>${esc(w.name)}${w.year?' ('+w.year+')':''}</span><span>${dup?'<span class="badge-dup">doublon</span>':'<span class="badge-new">nouveau</span>'}</span></div>`;
  }).join('');
  document.getElementById('import-info').style.display='block';
  document.getElementById('btn-do-import').style.display='block';
  document.getElementById('import-zone').style.display='none';
}

async function confirmImport(){
  const enrich=document.getElementById('enrich-check').checked;
  const btn=document.getElementById('btn-do-import');
  btn.disabled=true;btn.textContent='Import en cours...';
  for(const w of pendingImport){
    const existing=wines.find(x=>x.name.toLowerCase()===w.name.toLowerCase());
    if(existing){existing.qty=(existing.qty||0)+w.qty;}
    else{
      const wine={id:uid(),...w};
      if(enrich){
        try{const r=await searchWikipedia(w.name);if(r)for(const k in r){if(!wine[k])wine[k]=r[k];}}catch(e){}
        try{const r=await searchLCBO(w.name);if(r)for(const k in r){if(!wine[k])wine[k]=r[k];}}catch(e){}
      }
      wines.push(wine);
    }
  }
  save();closeModal('modal-import');renderWines();updateHeader();
  btn.disabled=false;btn.textContent='Importer';
}

/* ════════════════════════════
   STATS
════════════════════════════ */
function renderStats(){
  const total=wines.reduce((s,w)=>s+(w.qty||0),0);
  const valeur=wines.reduce((s,w)=>s+((w.price||0)*(w.qty||0)),0);
  const noted=wines.filter(w=>w.note);
  const avg=noted.length?(noted.reduce((s,w)=>s+w.note,0)/noted.length).toFixed(1):'—';
  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="stat-label">Bouteilles</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Références</div><div class="stat-value">${wines.length}</div></div>
    <div class="stat-card"><div class="stat-label">Valeur cave</div><div class="stat-value">${Math.round(valeur)}<span> €</span></div></div>
    <div class="stat-card"><div class="stat-label">Note moy.</div><div class="stat-value">${avg}${avg!=='—'?'<span style="color:#c4973a"> ★</span>':''}</div></div>
  `;
  const types=['rouge','blanc','rosé','champagne','mousseux'];
  const counts={};types.forEach(t=>counts[t]=wines.filter(w=>w.type===t).reduce((s,w)=>s+(w.qty||0),0));
  const active=types.filter(t=>counts[t]>0);
  const max=Math.max(...active.map(t=>counts[t]),1);
  document.getElementById('bar-chart').innerHTML=active.length
    ?active.map(t=>`<div class="bar-group"><div class="bar-val">${counts[t]}</div><div class="bar-fill" style="height:${Math.round(counts[t]/max*80)}px;background:${TYPE_COLORS[t]}"></div><div class="bar-lbl">${t.charAt(0).toUpperCase()+t.slice(1)}</div></div>`).join('')
    :'<p style="font-size:13px;color:var(--text3)">Aucune donnée</p>';
  const rm={};wines.forEach(w=>{if(w.region)rm[w.region]=(rm[w.region]||0)+(w.qty||0);});
  const topR=Object.entries(rm).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxR=topR[0]?.[1]||1;
  document.getElementById('region-list').innerHTML=topR.length
    ?topR.map(([r,c])=>`<div class="region-row"><span>${esc(r)}</span><div class="region-bar-bg"><div class="region-bar-fill" style="width:${Math.round(c/maxR*100)}%"></div></div><span style="font-size:12px;color:var(--text3);min-width:28px;text-align:right">${c}</span></div>`).join('')
    :'<p style="font-size:13px;color:var(--text3)">Aucune région renseignée</p>';
  const avail=wines.filter(w=>w.qty>0);
  if(!avail.length){document.getElementById('accord-suggestions').innerHTML='<p style="font-size:13px;color:var(--text3)">Ajoutez des vins pour voir les suggestions.</p>';return;}
  const aa={};avail.forEach(w=>(ACCORDS[w.type]||[]).forEach(a=>aa[a]=(aa[a]||0)+1));
  const topA=Object.entries(aa).sort((a,b)=>b[1]-a[1]).slice(0,9);
  document.getElementById('accord-suggestions').innerHTML=topA.map(([a])=>`<span class="accord-tag">${a}</span>`).join('');
}

document.getElementById('modal-add').addEventListener('click',e=>{if(e.target===document.getElementById('modal-add'))closeModal('modal-add');});
document.getElementById('modal-import').addEventListener('click',e=>{if(e.target===document.getElementById('modal-import'))closeModal('modal-import');});

load();renderWines();updateHeader();
</script>
